name: abs-media-importer
profile: python-service
visibility: public
license: MIT
governance:
  contributing: required
  pull_request_template: required
python_version: "3.12"
package_manager: uv
dependency_standards:
  runtime: requirements.txt
  development: requirements-dev.txt
  runtime_lock: requirements.lock
  development_lock: requirements-dev.lock
  repo_tooling: package.json devDependencies for Rulesync
  policy: keep dev/test tools out of runtime requirements

commands:
  install: uv venv && uv pip sync requirements-dev.lock
  install_dev: uv venv && uv pip sync requirements-dev.lock
  compile_requirements: scripts/compile-requirements.sh
  check_requirements_lock: scripts/check-requirements-lock.sh
  check: SKIP_DOCKER=1 scripts/check.sh
  format_check: uv run --no-project ruff format --check .
  lint: uv run --no-project ruff check .
  typecheck: uv run --no-project mypy app worker
  test: uv run --no-project pytest
  coverage: uv run --no-project coverage run -m pytest && uv run --no-project coverage report

quality_gates:
  semantic_pr_title: required
  ai_rules_sync: required
  coverage: report-only
  docs: required

release:
  release_please: true
  strategy: simple
  production_branch: main

deploy:
  provider: repo-specific
  workflow: .github/workflows/docker.yml

migration_notes: >
  Docker images published to Docker Hub and GHCR after successful CI on main
  or semver tags. Proxmox installer validation is a separate domain-specific
  workflow. Coverage default threshold (report-only) is safe for migration.
  Add --fail-under=<threshold> to the coverage command when ready.
  typecheck is left empty by design. Python typechecking (mypy, pyright)
  is adopted repo-by-repo; add a typecheck command when the repo is ready.
