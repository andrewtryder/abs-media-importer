name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  REQUIRED_UV_VERSION: "0.11.26"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.REQUIRED_UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/requirements*.txt
            **/requirements*.lock

      - name: Run quality checks
        run: SKIP_DOCKER=1 ./scripts/check.sh

      - name: Docker build smoke test
        run: docker build .
